name: daily_pulse
description: DailyPulse - Discipline & Habit Tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  firebase_storage: 12.4.10

  # State Management
  provider: ^6.1.1
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.0

  # UI
  google_fonts: ^6.1.0
  flutter_screenutil: ^5.9.0
  shimmer: ^3.0.0
  
   # Utils
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  timezone: ^0.9.2
  permission_handler: ^11.1.0
  image_picker: ^1.0.0
  file_picker: ^8.0.0
  url_launcher: ^6.2.0

  # Notifications
  flutter_local_notifications: ^18.0.1
  
  # AdMob (Baad mein uncomment karein)
  # google_mobile_ads: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
